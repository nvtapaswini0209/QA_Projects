<!DOCTYPE html>
<html>
<head>
    <title>Healthcare Portal Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">

    <h2 id="portal-title">Patient Portal</h2>
    <p id="portal-subtitle">Access Your Health Records</p>

    <!-- Toggle Buttons -->
    <div class="toggle-buttons">
        <button onclick="switchRole('patient')">Patient</button>
        <button onclick="switchRole('admin')">Admin</button>
    </div>

    <!-- Username & Password -->
    <input type="text" id="username" placeholder="Patient Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Sign In</button>

    <p id="error-msg"></p>

</div>

<script src="script.js"></script>
</body>
</html>
